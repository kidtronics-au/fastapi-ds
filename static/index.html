<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 1rem; text-align: center; background: #16213e; border-bottom: 1px solid #0f3460; }
  header h1 { font-size: 1.25rem; color: #e94560; }
  #spinner { padding: 0.4rem 1rem; background: #16213e; color: #888; font-style: italic; font-size: 0.875rem; border-bottom: 1px solid #0f3460; display: none; }
  #chat { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
  .msg { max-width: 75%; padding: 0.75rem 1rem; border-radius: 1rem; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: #0f3460; border-bottom-right-radius: 0.25rem; }
  .msg.assistant { align-self: flex-start; background: #16213e; border-bottom-left-radius: 0.25rem; }
  #input-area { display: flex; gap: 0.5rem; padding: 1rem; background: #16213e; border-top: 1px solid #0f3460; }
  #input-area textarea { flex: 1; padding: 0.75rem; border: 1px solid #0f3460; border-radius: 0.5rem; background: #1a1a2e; color: #e0e0e0; font-family: inherit; font-size: 1rem; resize: none; outline: none; }
  #input-area textarea:focus { border-color: #e94560; }
  #input-area button { padding: 0.75rem 1.5rem; background: #e94560; color: #fff; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 1rem; }
  #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
<script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.0-RC.8/bundles/datastar.js"></script>
</head>
<body
  data-signals="{message: '', loading: false, thread_id: ''}"
  data-on:load="$thread_id = crypto.randomUUID()"
>

<header><h1>AI Chatbot</h1></header>

<!-- Spinner: visible while $loading is true (pattern from ds-ref/app.py data-show) -->
<div id="spinner" data-show="$loading">Searching knowledge base&hellip;</div>

<!-- SSE target: server appends .msg rows here via patch_elements + data-merge-mode=append -->
<div id="chat"></div>

<div id="input-area">
  <textarea
    rows="1"
    placeholder="Type a message..."
    autofocus
    data-bind:message
    data-on:keydown="if(evt.key==='Enter'&&!evt.shiftKey){evt.preventDefault();if($message.trim()){$loading=true;@post('/chat')}}"
  ></textarea>
  <button
    data-on:click="$loading=true; @post('/chat')"
    data-attr:disabled="$loading"
  >Send</button>
</div>

<script>
// Auto-scroll as SSE injects new message rows
const chat = document.getElementById('chat');
new MutationObserver(() => { chat.scrollTop = chat.scrollHeight; })
  .observe(chat, { childList: true, subtree: true, characterData: true });
</script>
</body>
</html>
