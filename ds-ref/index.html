<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 1rem; text-align: center; background: #16213e; border-bottom: 1px solid #0f3460; }
  header h1 { font-size: 1.25rem; color: #e94560; }
  #chat { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
  .msg { max-width: 75%; padding: 0.75rem 1rem; border-radius: 1rem; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: #0f3460; border-bottom-right-radius: 0.25rem; }
  .msg.assistant { align-self: flex-start; background: #16213e; border-bottom-left-radius: 0.25rem; }
  #input-area { display: flex; gap: 0.5rem; padding: 1rem; background: #16213e; border-top: 1px solid #0f3460; }
  #input-area textarea { flex: 1; padding: 0.75rem; border: 1px solid #0f3460; border-radius: 0.5rem; background: #1a1a2e; color: #e0e0e0; font-family: inherit; font-size: 1rem; resize: none; outline: none; }
  #input-area textarea:focus { border-color: #e94560; }
  #input-area button { padding: 0.75rem 1.5rem; background: #e94560; color: #fff; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 1rem; }
  #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<header><h1>AI Chatbot</h1></header>
<div id="chat"></div>
<div id="input-area">
  <textarea id="userInput" rows="1" placeholder="Type a message..." autofocus></textarea>
  <button id="sendBtn" onclick="send()">Send</button>
</div>
<script>
const chat = document.getElementById('chat');
const input = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const threadId = crypto.randomUUID();

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendBtn.disabled = true;

  addMsg('user', text);

  const assistantDiv = addMsg('assistant', '');
  let full = '';

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, thread_id: threadId }),
    });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      full += decoder.decode(value, { stream: true });
      assistantDiv.textContent = full;
      chat.scrollTop = chat.scrollHeight;
    }
  } catch (err) {
    full = 'Error: ' + err.message;
    assistantDiv.textContent = full;
  }

  sendBtn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
